name: stdio_capture
description: >-
  File-descriptor-level capture of stdout/stderr for Dart — including output from
  native/FFI code and inherited subprocesses that bypass Dart's stream objects.
  POSIX (Linux + macOS).
version: 0.2.0
repository: https://github.com/danReynolds/stdio_capture
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  # The Dart-team FFI toolkit (malloc/calloc + Utf8 helpers). The only runtime dep.
  ffi: ^2.1.0

dev_dependencies:
  test: ^1.24.0
  lints: ^5.0.0
