name: stdio
description: >-
  File-descriptor-level (dup2) capture and redirection of stdout/stderr,
  including native/FFI and child-process output invisible to Dart streams.
  POSIX only.
version: 0.4.0
repository: https://github.com/danReynolds/stdio
topics:
  - cli
  - terminal
  - io
  - logging
  - ffi

platforms:
  linux:
  macos:

environment:
  sdk: ^3.5.0

dependencies:
  # The Dart-team FFI toolkit (malloc/calloc + Utf8 helpers). The only runtime dep.
  ffi: ^2.1.0

dev_dependencies:
  test: ^1.24.0
  lints: ^6.0.0
