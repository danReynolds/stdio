name: stdio
description: >-
  File-descriptor-level capture and redirection of stdout/stderr — including
  output from native/FFI code and child processes that bypasses Dart's stream
  objects. POSIX (Linux + macOS).
version: 0.4.0
repository: https://github.com/danReynolds/stdio
topics:
  - cli
  - terminal
  - io
  - logging
  - ffi

environment:
  sdk: ^3.5.0

dependencies:
  # The Dart-team FFI toolkit (malloc/calloc + Utf8 helpers). The only runtime dep.
  ffi: ^2.1.0

dev_dependencies:
  test: ^1.24.0
  lints: ^5.0.0
